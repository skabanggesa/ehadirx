<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Hadir | Tugas Luar (Face ID & GPS)</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 400px;
        }
        h2 { margin-top: 0; color: #0f172a; font-weight: 800; }
        video {
            width: 100%;
            border-radius: 12px;
            background: #000;
            transform: scaleX(-1);
            margin-bottom: 15px;
        }
        .status-box {
            background: #e2e8f0;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            display: none;
        }
        .btn:active { transform: scale(0.98); }
        
        /* Gaya untuk Fallback Manual PIN */
        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }
        #fallbackSection, #confirmSection { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📍 Rekod Luar</h2>
        
        <select id="statusPilihan" class="login-input" style="margin-bottom: 15px; font-weight: 700; color: #0f172a; font-size: 1rem; text-align: center;">
            <option value="Tugas Luar">Tugas Luar</option>
            <option value="Cuti Rehat Khas">Cuti Rehat Khas (CRK)</option>
            <option value="Cuti Rehat">Cuti Rehat (CR)</option>
        </select>
        
        <video id="video" autoplay muted playsinline></video>
        
        <div id="confirmSection" style="margin-bottom: 15px;">
            <p id="confirmNameText" style="font-size: 1.2rem; font-weight: 800; color: #0f172a; margin: 10px 0;"></p>
            <p style="font-size: 0.85rem; color: #64748b; margin-top: 0; margin-bottom: 15px;">Adakah wajah/nama ini tepat?</p>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background:#10b981; display:block; flex:1;" onclick="sahkanYa()">Ya, Betul</button>
                <button class="btn" style="background:#ef4444; display:block; flex:1;" onclick="sahkanBukan()">Bukan</button>
            </div>
        </div>

        <div id="fallbackSection">
            <p style="font-size: 0.8rem; color: #b91c1c; font-weight: 700; margin-top: 0;">AI Gagal Mengecam. Sila guna Mod Manual.</p>
            <select id="fallbackName" class="login-input">
                <option value="">-- Pilih Nama Anda --</option>
            </select>
            <input type="password" id="fallbackPin" class="login-input" placeholder="Kod Akses (PIN)" style="text-align:center; letter-spacing:3px; font-size:1.2rem;">
            <button class="btn" style="background:#f59e0b; display:block; margin-top:10px;" onclick="prosesDenganPIN()">Sahkan PIN & Hantar</button>
        </div>

        <div id="statusText" class="status-box">Sistem sedang dimuatkan...</div>
        <button id="scanBtn" class="btn" onclick="prosesKehadiranLuar()">Imbas Wajah</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4vbsw9PPdrSIwiCBg2t1XnkSo2k6aNhg",
            authDomain: "e-hadir-ba989.firebaseapp.com",
            projectId: "e-hadir-ba989",
            storageBucket: "e-hadir-ba989.firebasestorage.app",
            messagingSenderId: "777207462690",
            appId: "1:777207462690:web:0c65d249532428bea6437b",
            measurementId: "G-062X22JHXY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models/';

        let labeledDescriptors = [];
        let allUsersData = []; 
        let failCount = 0; 
        let tempDetectedName = ""; // Simpan nama sementara menunggu pengesahan

        const statusText = document.getElementById("statusText");
        const scanBtn = document.getElementById("scanBtn");
        const video = document.getElementById("video");
        const fallbackSection = document.getElementById("fallbackSection");
        const confirmSection = document.getElementById("confirmSection");
        const fallbackNameSelect = document.getElementById("fallbackName");

        // 1. Muatkan Model AI, Data Wajah, dan Kamera
        async function initSystem() {
            try {
                statusText.innerText = "Memuatkan Enjin AI...";
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                statusText.innerText = "Memuatkan Data Staf...";
                const querySnapshot = await getDocs(collection(db, "users"));
                
                querySnapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.name) {
                        allUsersData.push({ name: data.name, accessCode: data.accessCode || "" });
                    }
                    if (data.descriptors && data.descriptors.length > 0) {
                        const descs = data.descriptors.map(d => new Float32Array(Object.values(d.d)));
                        labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(data.name, descs));
                    }
                });

                allUsersData.sort((a,b) => a.name.localeCompare(b.name)).forEach(u => {
                    const opt = document.createElement("option");
                    opt.value = u.name;
                    opt.text = u.name;
                    fallbackNameSelect.appendChild(opt);
                });

                statusText.innerText = "Menghidupkan Kamera...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                
                statusText.innerText = "AI Sedia. Sila pandang kamera.";
                statusText.style.background = "#d1fae5";
                statusText.style.color = "#065f46";
                scanBtn.style.display = "block";
            } catch (error) {
                statusText.innerText = "Ralat: " + error.message;
                statusText.style.background = "#fee2e2";
                statusText.style.color = "#991b1b";
            }
        }

        // 2. Imbas Wajah 
        window.prosesKehadiranLuar = async () => {
            if (labeledDescriptors.length === 0) return alert("Tiada data wajah di dalam sistem!");

            statusText.innerText = "Mengecam Wajah... Sila kekal diam.";
            statusText.style.background = "#fef3c7";
            statusText.style.color = "#92400e";
            scanBtn.disabled = true;

            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

            // Jika wajah tiada
            if (!detection) {
                handleKesanGagal("Wajah tidak dijumpai. Pastikan pencahayaan terang.");
                return;
            }

            const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.45);
            const match = faceMatcher.findBestMatch(detection.descriptor);

            // Jika wajah langsung tidak dikenali oleh AI
            if (match.label === "unknown") {
                handleKesanGagal("Wajah tidak dikenali oleh sistem.");
                return;
            }

            // Jika AI teka wajah tersebut
            tempDetectedName = match.label;
            
            // Sorok butang imbas, tunjuk bahagian pengesahan
            scanBtn.style.display = "none";
            statusText.innerText = "Sila sahkan identiti anda di bawah.";
            statusText.style.background = "#e0f2fe";
            statusText.style.color = "#0369a1";
            
            document.getElementById("confirmNameText").innerText = tempDetectedName;
            confirmSection.style.display = "block";
        };

        // --- Logik Pengesahan (Ya / Bukan) ---
        window.sahkanYa = () => {
            confirmSection.style.display = "none";
            failCount = 0; // Reset balik jika berjaya
            dapatkanGPSdanSimpan(tempDetectedName);
        };

        window.sahkanBukan = () => {
            confirmSection.style.display = "none";
            handleKesanGagal("Anda menolak padanan wajah.");
        };

        // --- Fungsi Urus Kegagalan ---
        function handleKesanGagal(mesej) {
            failCount++;
            if (failCount >= 2) {
                // Gagal 2 kali -> Hentikan video, minta PIN
                video.srcObject.getTracks().forEach(track => track.stop()); 
                video.style.display = "none";
                scanBtn.style.display = "none";
                confirmSection.style.display = "none";
                fallbackSection.style.display = "block";
                
                statusText.innerText = "Mod manual diaktifkan kerana imbasan gagal 2 kali.";
                statusText.style.background = "#fee2e2";
                statusText.style.color = "#991b1b";
            } else {
                // Baru gagal 1 kali -> Beri peluang imbas semula
                statusText.innerText = `${mesej} (Percubaan ${failCount}/2). Sila imbas semula.`;
                statusText.style.background = "#fee2e2";
                statusText.style.color = "#991b1b";
                scanBtn.style.display = "block";
                scanBtn.disabled = false;
            }
        }

        // 3. Proses Guna PIN Manual
        window.prosesDenganPIN = () => {
            const selectedName = fallbackNameSelect.value;
            const enteredPin = document.getElementById("fallbackPin").value.trim();

            if (!selectedName) return alert("Sila pilih nama anda!");
            if (!enteredPin) return alert("Sila masukkan Kod Akses!");

            const user = allUsersData.find(u => u.name === selectedName);

            if (!user || user.accessCode !== enteredPin) {
                alert("Kod Akses SALAH! Sila cuba lagi.");
                document.getElementById("fallbackPin").value = ""; 
                return;
            }

            document.querySelector("#fallbackSection button").style.display = "none";
            dapatkanGPSdanSimpan(selectedName);
        };

// 4. Tarik GPS & Simpan 
        async function dapatkanGPSdanSimpan(namaGuru) {
            // AMBIL NILAI DARI DROPDOWN
            const statusSemasa = document.getElementById("statusPilihan").value;

            statusText.innerText = `Identiti Disahkan: ${namaGuru}. Mengesan Lokasi GPS...`;
            statusText.style.background = "#e0f2fe";
            statusText.style.color = "#0369a1";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    const mapLink = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;

                    try {
                        // KEMASKINI BLOK INI
                        await addDoc(collection(db, "attendance"), {
                            name: namaGuru,
                            status: statusSemasa, // Guna pembolehubah dropdown di sini
                            locationLink: mapLink,
                            timestamp: serverTimestamp()
                        });

                        // Mesej berjaya yang dinamis
                        statusText.innerText = `✅ Selesai! Rekod ${statusSemasa} telah disimpan.`;
                        statusText.style.background = "#d1fae5";
                        statusText.style.color = "#065f46";
                    } catch (error) {
                        statusText.innerText = "Ralat pangkalan data!";
                    }
                }, (error) => {
                    statusText.innerText = "❌ Sila benarkan akses Lokasi (GPS) pada pelayar bimbit anda.";
                    if (failCount < 2) scanBtn.disabled = false;
                }, { enableHighAccuracy: true });
            } else {
                statusText.innerText = "Peranti anda tidak menyokong fungsi GPS.";
            }
        }

        initSystem();
    </script>
</body>
</html>
