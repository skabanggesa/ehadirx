<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Kehadiran Digital V1.0</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #22c55e;
            --bg: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg); 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container { 
            width: 90%; max-width: 420px; background: white; padding: 40px 30px; 
            border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); text-align: center;
        }

        .logo { width: 80px; margin-bottom: 15px; }
        h1 { font-size: 1.4rem; color: var(--primary); margin: 0; font-weight: 800; }
        p.version { font-size: 0.75rem; color: #64748b; margin-top: 5px; margin-bottom: 30px; letter-spacing: 1px; }

        .status-box { 
            padding: 14px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; 
            margin-bottom: 25px; border: 1px solid #e2e8f0; background: #f1f5f9; color: #475569;
        }

        video { 
            width: 100%; border-radius: 18px; background: #000; display: none; 
            transform: scaleX(-1); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        input { 
            width: 100%; padding: 16px; margin-bottom: 12px; border: 2px solid #e2e8f0; 
            border-radius: 14px; font-size: 1.1rem; text-align: center; box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-main { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 14px; font-weight: 700; cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-main:active { transform: scale(0.98); }

        .overlay { 
            position: fixed; inset: 0; color: white; display: none; 
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .bg-success { background: var(--success); }
    </style>
</head>
<body>

<div id="overlay" class="overlay bg-success">
    <div id="overlayIcon" style="font-size: 5rem; margin-bottom: 10px;">✅</div>
    <div id="overlayText" style="font-size: 1.5rem; font-weight: 800; text-align: center; padding: 20px;"></div>
</div>

<div class="container">
    <img src="ehadir.png" alt="Logo" class="logo">
    <h1>E-HADIR DIGITAL</h1>
    <p class="version">EDISI PINTAR V1.0</p>

    <div id="status" class="status-box">Sistem sedia. Sila masukkan PIN.</div>

    <div id="pinSection">
        <input type="password" id="pinInput" placeholder="KOD PIN 6-DIGIT" maxlength="6" inputmode="numeric">
        <button class="btn-main" onclick="verifyPin()">AKTIFKAN IMBASAN</button>
    </div>

    <video id="video" autoplay muted playsinline></video>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyCwh99Ui4KPXgC-W-CpCg-edYnHN3aVmrk",
  authDomain: "portal-8368.firebaseapp.com",
  projectId: "portal-8368",
  storageBucket: "portal-8368.firebasestorage.app",
  messagingSenderId: "150403488308",
  appId: "1:150403488308:web:fac9b3c52dcd9975130861"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const DAILY_PIN = "123456"; 
    let registeredUsers = [];
    let isProcessing = false;
    const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

    window.verifyPin = async function() {
        if(document.getElementById('pinInput').value !== DAILY_PIN) return alert("PIN Salah!");

        document.getElementById('pinSection').style.display = "none";
        document.getElementById('status').innerText = "Memulakan AI...";

        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri('models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('models');
            
            const snap = await getDocs(collection(db, "users"));
            snap.forEach(doc => registeredUsers.push(doc.data()));
            
            startCamera();
        } catch (err) { alert("Ralat model AI."); }
    };

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            const video = document.getElementById('video');
            video.srcObject = stream;
            video.style.display = "block";
            document.getElementById('status').innerText = "Sila halakan wajah ke kamera";
            setInterval(scan, 1000); 
        });
    }

    async function scan() {
        if(isProcessing) return;
        const video = document.getElementById('video');
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        
        if (detection) {
            for (let user of registeredUsers) {
                const dist = faceapi.euclideanDistance(detection.descriptor, new Float32Array(user.descriptor));
                if (dist < 0.45) {
                    isProcessing = true;
                    beep.play();
                    saveAttendance(user.name);
                    break;
                }
            }
        }
    }

    async function saveAttendance(name) {
        const now = new Date();
        const todayStr = now.toLocaleDateString('en-CA');
        const status = (now.getHours() > 7 || (now.getHours() === 7 && now.getMinutes() > 45)) ? "Lewat" : "Hadir";
        
        try {
            // Semak jika sudah ada rekod untuk hari ini (untuk dikemas kini)
            const qAtt = query(collection(db, "attendance"), where("name", "==", name));
            const querySnapshot = await getDocs(qAtt);
            let existingDocId = null;

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const ts = data.timestamp?.toDate();
                if (ts && ts.toLocaleDateString('en-CA') === todayStr) {
                    existingDocId = doc.id;
                }
            });

            if (existingDocId) {
                // Kemas kini rekod lama
                await updateDoc(doc(db, "attendance", existingDocId), {
                    timestamp: serverTimestamp(),
                    status: status + " (Update)"
                });
            } else {
                // Tambah rekod baru
                await addDoc(collection(db, "attendance"), {
                    name: name,
                    timestamp: serverTimestamp(),
                    status: status
                });
            }

            const overlay = document.getElementById('overlay');
            document.getElementById('overlayText').innerHTML = `REKOD DIKEMASKINI<br>${name}<br><br><span style="font-size:1rem; opacity:0.8">${status} pada ${now.toLocaleTimeString()}</span>`;
            overlay.style.display = "flex";
            
            setTimeout(() => {
                overlay.style.display = "none";
                isProcessing = false;
            }, 3000);
        } catch (e) {
            alert("Ralat simpan data.");
            isProcessing = false;
        }
    }
</script>
</body>
</html>
