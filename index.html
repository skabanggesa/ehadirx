<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Kehadiran Digital V1.1 - Smart Role</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #22c55e; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 420px; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .logo { width: 60px; margin-bottom: 10px; }
        h1 { font-size: 1.2rem; color: var(--primary); margin: 0; font-weight: 800; }
        .status-box { padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; margin-bottom: 20px; border: 1px solid #e2e8f0; background: #f1f5f9; color: #475569; }
        
        /* Video & Canvas Styling */
        .video-wrapper { position: relative; width: 100%; border-radius: 18px; overflow: hidden; background: #000; display: none; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }

        input { width: 100%; padding: 16px; margin-bottom: 12px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 1.1rem; text-align: center; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; }
        .overlay { position: fixed; inset: 0; color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(8px); }
        .bg-success { background: rgba(34, 197, 94, 0.9); }
        .bg-late { background: rgba(245, 158, 11, 0.9); } /* Warna oren untuk lewat */
    </style>
</head>
<body>

<div id="overlay" class="overlay bg-success">
    <div id="overlayIcon" style="font-size: 5rem; margin-bottom: 10px;">✅</div>
    <div id="overlayText" style="font-size: 1.5rem; font-weight: 800; text-align: center; padding: 20px;"></div>
</div>

<div class="container">
    <img src="ehadir.png" alt="Logo" class="logo">
    <h1>E-HADIR DIGITAL</h1>
    <p style="font-size: 0.75rem; color: #64748b; margin-top: 5px; margin-bottom: 20px;">VERSI PINTAR (GURU & AKP)</p>

    <div id="status" class="status-box">Memulakan sistem AI...</div>

    <div id="pinSection" style="display:none;">
        <input type="password" id="pinInput" placeholder="KOD PIN 6-DIGIT" maxlength="6" inputmode="numeric">
        <button class="btn-main" onclick="verifyPin()">AKTIFKAN IMBASAN</button>
    </div>

    <div id="videoWrapper" class="video-wrapper">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlayCanvas"></canvas>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4vbsw9PPdrSIwiCBg2t1XnkSo2k6aNhg",
        authDomain: "e-hadir-ba989.firebaseapp.com",
        projectId: "e-hadir-ba989",
        storageBucket: "e-hadir-ba989.firebasestorage.app",
        messagingSenderId: "777207462690",
        appId: "1:777207462690:web:0c65d249532428bea6437b",
        measurementId: "G-062X22JHXY"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const DAILY_PIN = "123456"; 
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models/';
    
    let faceMatcher = null;
    let isProcessing = false;
    let lastScanTime = 0;
    
    // VARIABLE BARU: Untuk simpan mapping Nama -> Jawatan
    let userRoles = {}; 

    const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

    // 1. MUAT MODEL & WARM-UP
    async function initSystem() {
        try {
            const status = document.getElementById('status');
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            
            // Warm-up
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 128; tempCanvas.height = 128;
            await faceapi.detectSingleFace(tempCanvas, new faceapi.TinyFaceDetectorOptions());
            
            status.innerText = "Sistem sedia. Masukkan PIN.";
            document.getElementById('pinSection').style.display = "block";
        } catch (e) {
            document.getElementById('status').innerText = "Ralat AI: Pastikan internet stabil.";
        }
    }
    initSystem();

    // 2. VERIFIKASI PIN & LOAD DATA (TERMASUK ROLE)
    window.verifyPin = async function() {
        if(document.getElementById('pinInput').value !== DAILY_PIN) {
            alert("PIN Salah!"); return;
        }

        document.getElementById('pinSection').style.display = "none";
        document.getElementById('status').innerText = "Menyusun data wajah & jawatan...";

        try {
            const snap = await getDocs(collection(db, "users"));
            const labeledDescriptors = [];
            
            // Kosongkan mapping lama
            userRoles = {};

            snap.forEach(doc => {
                const data = doc.data();
                
                // SIMPAN JAWATAN KE DALAM MEMORI
                // Jika tiada role dalam DB, kita anggap default = "GURU"
                userRoles[data.name] = data.role || "GURU";

                // Proses Face Descriptor
                if (data.descriptor) { // Data lama
                    labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(data.name, [new Float32Array(data.descriptor)]));
                } 
                else if (data.descriptors) { // Data baru
                    const descArray = data.descriptors.map(item => new Float32Array(item.d));
                    labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(data.name, descArray));
                }
            });

            if (labeledDescriptors.length === 0) {
                alert("Tiada guru didaftarkan.");
                location.reload();
                return;
            }

            faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.45);
            startCamera();
        } catch (err) { 
            console.error(err);
            alert("Ralat memuat turun data."); 
        }
    };
    
    // 3. KAMERA
    function startCamera() {
        navigator.mediaDevices.getUserMedia({ 
            video: { width: 400, height: 300, facingMode: "user" } 
        })
        .then(stream => {
            const video = document.getElementById('video');
            video.srcObject = stream;
            document.getElementById('videoWrapper').style.display = "block";
            document.getElementById('status').innerText = "Sila pandang kamera";
            
            video.onloadedmetadata = () => {
                requestAnimationFrame(scanLoop);
            };
        });
    }

    // 4. LOOP IMBASAN
    async function scanLoop(now) {
        if(isProcessing) return requestAnimationFrame(scanLoop);
        if (now - lastScanTime >= 100) {
            lastScanTime = now;
            await doScan();
        }
        requestAnimationFrame(scanLoop);
    }

    // 5. PROSES PENGESANAN WAJAH
    async function doScan() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlayCanvas');
        const displaySize = { width: video.videoWidth, height: video.videoHeight };
        
        if (canvas.width !== displaySize.width) {
            faceapi.matchDimensions(canvas, displaySize);
        }

        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.5 }))
            .withFaceLandmarks()
            .withFaceDescriptor();
        
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (detection) {
            const resizedDetection = faceapi.resizeResults(detection, displaySize);
            ctx.strokeStyle = "#3b82f6"; ctx.lineWidth = 4;
            ctx.strokeRect(resizedDetection.detection.box.x, resizedDetection.detection.box.y, resizedDetection.detection.box.width, resizedDetection.detection.box.height);

            const result = faceMatcher.findBestMatch(detection.descriptor);
            
            if (result.label !== 'unknown') {
                isProcessing = true;
                beep.play();
                saveAttendance(result.label);
            }
        }
    }

    // 6. SIMPAN KE FIREBASE (LOGIK LEWAT MENGIKUT ROLE)
    async function saveAttendance(name) {
        const now = new Date();
        const todayStr = now.toLocaleDateString('en-CA');
        const currentTimeStr = now.toTimeString().substring(0, 5); // Format "HH:MM", contoh "07:15"

        // === LOGIK BARU MULA DI SINI ===
        
        // 1. Dapatkan Role user dari memori (userRoles)
        // Kalau tak jumpa nama, default ke "GURU"
        const role = (userRoles[name] || "GURU").toUpperCase(); 
        
        // 2. Tentukan masa cutoff
        let cutoffTime = "07:10"; // Masa lewat untuk Guru
        if (role === "AKP") {
            cutoffTime = "08:00"; // Masa lewat untuk AKP
        }

        // 3. Bandingkan masa sekarang dengan cutoff
        // Jika masa sekarang (contoh 07:15) lebih besar dari cutoff (07:10), maka status LEWAT
        const isLate = currentTimeStr > cutoffTime;
        const status = isLate ? "Lewat" : "Hadir";

        // === LOGIK TAMAT ===

        try {
            const qAtt = query(collection(db, "attendance"), where("name", "==", name));
            const querySnapshot = await getDocs(qAtt);
            let existingDocId = null;

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const ts = data.timestamp?.toDate();
                if (ts && ts.toLocaleDateString('en-CA') === todayStr) existingDocId = doc.id;
            });

            if (existingDocId) {
                await updateDoc(doc(db, "attendance", existingDocId), { timestamp: serverTimestamp(), status: status + " (Update)" });
            } else {
                await addDoc(collection(db, "attendance"), { name: name, timestamp: serverTimestamp(), status: status });
            }

            // Tunjukkan Overlay
            const overlay = document.getElementById('overlay');
            const bgClass = isLate ? "bg-late" : "bg-success"; // Tukar warna background jika lewat
            
            overlay.className = `overlay ${bgClass}`; // Reset class
            overlay.style.display = "flex";

            document.getElementById('overlayText').innerHTML = `
                REKOD ${isLate ? "LEWAT" : "BERJAYA"}<br>
                ${name}<br>
                <span style="font-size:0.8rem; background:rgba(0,0,0,0.2); padding:2px 8px; border-radius:4px;">${role}</span>
                <br><br>
                <span style="font-size:1rem; opacity:0.8">${status} pada ${now.toLocaleTimeString()}</span>
            `;
            
            setTimeout(() => {
                overlay.style.display = "none";
                isProcessing = false;
            }, 3000);
        } catch (e) {
            console.error(e);
            isProcessing = false;
        }
    }
</script>
</body>
</html>
