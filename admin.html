<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentadbir | Sistem Kehadiran</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #f1f5f9;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--primary); }
        
        #loginSection { 
            max-width: 380px; margin: 100px auto; background: white; 
            padding: 40px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
        }
        .login-input { 
            width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #e2e8f0; 
            border-radius: 12px; box-sizing: border-box; font-size: 1rem;
        }

        .header { 
            display: flex; align-items: center; justify-content: space-between; 
            background: white; padding: 15px 5%; border-bottom: 1px solid #e2e8f0;
        }

        .main-container { padding: 30px 5%; display: grid; grid-template-columns: 1fr; gap: 25px; }

        .card { 
            background: white; padding: 25px; border-radius: 20px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        h2 { font-size: 1.1rem; margin-top: 0; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 20px; }

        video { width: 100%; border-radius: 16px; background: #000; transform: scaleX(-1); }

        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .btn-save { background: var(--accent); color: white; width: 100%; margin-top: 15px; }
        .btn-excel { background: var(--success); color: white; }
        .btn-logout { background: #fee2e2; color: var(--danger); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: #64748b; font-size: 0.8rem; border-bottom: 2px solid #f1f5f9; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }

        .status-tag { padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; }
        .tag-hadir { background: #d1fae5; color: #065f46; }
        .tag-tidak { background: #fee2e2; color: #991b1b; }

        @media (min-width: 1024px) { 
            .main-container { grid-template-columns: 350px 1fr; }
            .full-width { grid-column: span 2; }
        }
    </style>
</head>
<body>

<div id="loginSection">
    <img src="ehadir.png" alt="Logo" style="width:60px; margin-bottom:20px;">
    <h2 style="color:var(--primary)">Akses Pentadbir</h2>
    <input type="email" id="loginEmail" class="login-input" placeholder="Emel Rasmi">
    <input type="password" id="loginPass" class="login-input" placeholder="Kata Laluan">
    <button onclick="handleLogin()" class="btn btn-save">LOG MASUK</button>
</div>

<div id="adminContent" style="display:none;">
    <div class="header">
        <div style="font-weight: 800; font-size: 1.2rem;">PANTU KEHADIRAN</div>
        <button class="btn btn-logout" onclick="handleLogout()">KELUAR</button>
    </div>

    <div class="main-container">
        <div class="card">
            <h2>Daftar Staf Baru</h2>
            <video id="adminVideo" autoplay muted playsinline></video>
            <input type="text" id="staffName" placeholder="Nama Penuh" class="login-input" style="margin-top:15px;">
            <button onclick="register()" class="btn btn-save">SIMPAN WAJAH</button>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0;">Laporan Hari Ini</h2>
                <button onclick="exportExcel()" class="btn btn-excel">MUAT TURUN EXCEL</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="reportTable">
                    <thead>
                        <tr><th>NAMA GURU</th><th>WAKTU KEMASKINI</th><th>STATUS</th><th>TINDAKAN</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4vbsw9PPdrSIwiCBg2t1XnkSo2k6aNhg",
        authDomain: "e-hadir-ba989.firebaseapp.com",
        projectId: "e-hadir-ba989",
        storageBucket: "e-hadir-ba989.firebasestorage.app",
        messagingSenderId: "777207462690",
        appId: "1:777207462690:web:0c65d249532428bea6437b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            initAdmin(); 
        } else {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminContent').style.display = 'none';
        }
    });

    window.handleLogin = async () => {
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value);
        } catch (e) { alert("Gagal!"); }
    };

    window.handleLogout = () => signOut(auth);

    async function initAdmin() {
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri('models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('models');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('adminVideo').srcObject = stream;
        } catch (e) {}

        onSnapshot(collection(db, "users"), (uSnap) => {
            const users = [];
            uSnap.forEach(d => users.push({id: d.id, ...d.data()}));

            onSnapshot(query(collection(db, "attendance"), orderBy("timestamp", "desc")), (aSnap) => {
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = "";
                const today = new Date().toLocaleDateString('en-CA');
                const logs = {};

                aSnap.forEach(d => {
                    const data = d.data();
                    const ts = data.timestamp?.toDate();
                    if(ts && ts.toLocaleDateString('en-CA') === today) {
                        logs[data.name] = { time: ts.toLocaleTimeString(), status: data.status, id: d.id };
                    }
                });

                users.forEach(u => {
                    const log = logs[u.name];
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${u.name}</strong></td>
                            <td>${log ? log.time : '--:--'}</td>
                            <td><span class="status-tag ${log ? 'tag-hadir' : 'tag-tidak'}">${log ? log.status : 'Belum Imbas'}</span></td>
                            <td><button onclick="deleteRecord('${log?.id}')" style="color:red; cursor:pointer; background:none; border:none;">${log ? 'Padam' : ''}</button></td>
                        </tr>`;
                });
            });
        });
    }

    window.register = async () => {
        const name = document.getElementById('staffName').value;
        const detection = await faceapi.detectSingleFace(document.getElementById('adminVideo'), new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        if (detection && name) {
            await addDoc(collection(db, "users"), { name: name, descriptor: Array.from(detection.descriptor) });
            alert("Staf Berjaya Didaftarkan");
            document.getElementById('staffName').value = "";
        }
    };

    window.deleteRecord = async (id) => {
        if(id && confirm("Padam rekod ini?")) await deleteDoc(doc(db, "attendance", id));
    };

    window.exportExcel = () => {
        XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("reportTable")), `Kehadiran_${new Date().toLocaleDateString()}.xlsx`);
    };
</script>
</body>
</html>
