<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentadbir Pro | E-Hadir</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --danger: #ef4444; --success: #10b981;
            --warning: #f59e0b; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg: #020617; --card: #1e293b; --text: #f1f5f9; --border: #334155; --primary: #3b82f6;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); transition: 0.3s; }
        .header { display: flex; align-items: center; justify-content: space-between; background: var(--card); padding: 15px 5%; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .main-container { padding: 25px 5%; display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 1200px) { .main-container { grid-template-columns: 350px 1fr; } }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .stat-card h4 { margin: 0; font-size: 0.75rem; color: #64748b; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        .card { background: var(--card); padding: 25px; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        h2 { font-size: 1rem; margin-top: 0; margin-bottom: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        video { width: 100%; border-radius: 16px; background: #000; transform: scaleX(-1); }
        .login-input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 12px; box-sizing: border-box; background: var(--bg); color: var(--text); }
        .btn { padding: 10px 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.85rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-save { background: var(--accent); color: white; width: 100%; justify-content: center; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #64748b; font-size: 0.7rem; border-bottom: 2px solid var(--border); text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .tag { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
        .tag-hadir { background: #d1fae5; color: #065f46; }
        .tag-lewat { background: #fef3c7; color: #92400e; }
        .tag-tidak { background: #f1f5f9; color: #64748b; }
        .role-badge { font-size: 0.6rem; background: var(--border); padding: 2px 6px; border-radius: 4px; cursor: pointer; margin-left: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .role-badge:hover { background: var(--accent); color: white; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--border); max-width: 90%; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .calendar-day-label { font-size: 0.6rem; text-align: center; font-weight: 800; color: #64748b; padding-bottom: 5px; }
        .calendar-cell { aspect-ratio: 1; border-radius: 10px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; position: relative; min-width: 40px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 4px; }
        .dot-hadir { background: var(--success); }
        .dot-lewat { background: var(--warning); }
        .dot-cuti { background: var(--accent); }
        #loginSection { max-width: 380px; margin: 100px auto; text-align: center; background: var(--card); padding: 40px; border-radius: 28px; border: 1px solid var(--border); }
        #regStatus { font-size: 0.7rem; font-weight: 700; text-align: center; margin-top: 5px; color: var(--accent); }
    </style>
</head>
<body>

<div id="pinModal" class="modal-overlay">
    <div class="modal-content" style="width: 340px;">
        <h3 id="modalTitle" style="margin:0 0 10px 0;">Sahkan Tindakan</h3>
        <p id="modalDesc" style="font-size: 0.8rem; color: #64748b; margin-bottom: 15px;"></p>
        
        <div id="manualOptions" style="display:none;">
            <select id="statusSelect" class="login-input">
                <option value="Hadir (Manual)">Hadir Manual</option>
                <option value="Kursus/Tugas Luar">Kursus/Tugas Luar</option>
                <option value="Cuti Sakit (MC)">Cuti Sakit (MC)</option>
                <option value="Cuti Rehat (CRK)">Cuti Rehat (CRK)</option>
            </select>
            
            <div style="margin-top: 10px; text-align: left;">
                <label style="font-size: 0.8rem; color: #64748b; font-weight: 700;">Tetapkan Masa:</label>
                <input type="time" id="manualTimeInput" class="login-input" style="margin-top: 5px;">
            </div>
        </div>

        <input type="password" id="manualPinInput" class="login-input" placeholder="Kod PIN" maxlength="4" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;">
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="closeModal('pinModal')" class="btn btn-outline" style="flex:1;">Batal</button>
            <button id="pinSubmitBtn" class="btn btn-save" style="flex:1;">Sahkan</button>
        </div>
    </div>
</div>

<div id="calendarModal" class="modal-overlay">
    <div class="modal-content" style="width: 450px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div>
                <h3 id="calStaffName" style="margin:0; color:var(--accent);">Nama Guru</h3>
                <p id="calMonthYear" style="margin:0; font-size:0.8rem; opacity:0.7;">Bulan Tahun</p>
            </div>
            <div style="display:flex; gap:5px;">
                <button onclick="changeMonth(-1)" class="btn btn-outline">←</button>
                <button onclick="changeMonth(1)" class="btn btn-outline">→</button>
                <button onclick="closeModal('calendarModal')" class="btn" style="background:#fee2e2; color:var(--danger);">X</button>
            </div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <p style="font-size:0.7rem; color:var(--warning); text-align:center; margin-top:10px;">Nota: Hanya data yang telah dimuatkan akan dipaparkan.</p>
    </div>
</div>

<div id="loginSection">
    <img src="ehadir.png" alt="Logo" style="width:60px; margin-bottom:20px;">
    <h2>Pentadbir Sistem</h2>
    <input type="email" id="loginEmail" class="login-input" placeholder="Emel Admin">
    <input type="password" id="loginPass" class="login-input" placeholder="Kata Laluan">
    <button onclick="handleLogin()" class="btn btn-save" style="margin-top:10px;">LOG MASUK</button>
</div>

<div id="adminContent" style="display:none;">
    <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
            <img src="ehadir.png" alt="Logo" style="width:35px;">
            <span style="font-weight: 800; font-size: 1.1rem;">E-HADIR <span style="color:var(--accent)">PRO</span></span>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="toggleTheme()" class="btn btn-outline">🌓</button>
            <button onclick="handleLogout()" class="btn btn-outline" style="color:var(--danger)">Keluar</button>
        </div>
    </div>

    <div class="main-container">
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="card">
                <h2>👤 Daftar Staf Baru</h2>
                <video id="adminVideo" autoplay muted playsinline></video>
                <div id="regStatus">AI SEDIA</div>
                
                <input type="text" id="staffName" placeholder="Nama Penuh" class="login-input" style="margin-top:10px;">
                
                <select id="staffRole" class="login-input">
                    <option value="Guru">Jawatan: GURU</option>
                    <option value="AKP">Jawatan: AKP</option>
                </select>

                <button onclick="register()" class="btn btn-save">SIMPAN IDENTITI (3 SAMPEL)</button>
                <button onclick="clearAllAttendanceToday()" class="btn" style="width:100%; margin-top:10px; justify-content:center; background: var(--danger); color: white;">🗑️ Kosongkan Kehadiran Hari Ini</button>
            </div>

            <div class="card">
                <h2>🔍 Carian & Arkib</h2>
                <input type="date" id="dateFilter" class="login-input" onchange="loadAttendanceForDate()">
                <input type="text" id="searchName" class="login-input" placeholder="Cari nama guru..." onkeyup="updateDashboard()">
                <button onclick="exportExcel()" class="btn btn-outline" style="width:100%; margin-top:10px; justify-content:center;">📥 Muat Turun Excel</button>
            </div>
        </div>

        <div>
            <div class="stats-grid">
                <div class="stat-card"><h4>Staf</h4><p id="statTotal">0</p></div>
                <div class="stat-card"><h4>Hadir</h4><p id="statPresent" style="color:var(--success)">0</p></div>
                <div class="stat-card"><h4>Lewat</h4><p id="statLate" style="color:var(--warning)">0</p></div>
                <div class="stat-card"><h4>Tiada Rekod</h4><p id="statAbsent" style="color:var(--danger)">0</p></div>
            </div>

            <div class="card">
                <h2>📋 Laporan (Susunan A-Z)</h2>
                <div style="overflow-x: auto;">
                    <table id="reportTable">
                        <thead>
                            <tr>
                                <th>Nama & Jawatan</th>
                                <th>Waktu</th>
                                <th>Status</th>
                                <th style="text-align:right;">Tindakan</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, getDocs, where, updateDoc, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4vbsw9PPdrSIwiCBg2t1XnkSo2k6aNhg",
        authDomain: "e-hadir-ba989.firebaseapp.com",
        projectId: "e-hadir-ba989",
        storageBucket: "e-hadir-ba989.firebasestorage.app",
        messagingSenderId: "777207462690",
        appId: "1:777207462690:web:0c65d249532428bea6437b",
        measurementId: "G-062X22JHXY"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models/';
    const ADMIN_PIN = "1234";

    let allUsers = [];
    let currentAttendance = {}; 
    let unsubscribeAttendance = null; 
    let calDate = new Date();
    let currentViewedStaff = "";

    async function initAdmin() {
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            const video = document.getElementById('adminVideo');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 300 } });
            video.srcObject = stream;
            
            const hariIni = new Date().toISOString().split('T')[0];
            document.getElementById('dateFilter').value = hariIni;
            
            startDataListeners();
        } catch (err) { console.error("Ralat Kamera:", err); }
    }

    function startDataListeners() {
        // Ambil data user termasuk role
        onSnapshot(collection(db, "users"), (snap) => {
            allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            allUsers.sort((a, b) => a.name.localeCompare(b.name));
            loadAttendanceForDate(); // Refresh data bila user berubah
        });
    }

    window.loadAttendanceForDate = () => {
        const filterDate = document.getElementById('dateFilter').value;
        
        if (unsubscribeAttendance) {
            unsubscribeAttendance();
        }

        const startDate = new Date(filterDate);
        startDate.setHours(0, 0, 0, 0);
        
        const endDate = new Date(filterDate);
        endDate.setHours(23, 59, 59, 999);

        const q = query(
            collection(db, "attendance"), 
            where("timestamp", ">=", Timestamp.fromDate(startDate)),
            where("timestamp", "<=", Timestamp.fromDate(endDate)),
            orderBy("timestamp", "desc")
        );

        unsubscribeAttendance = onSnapshot(q, (snap) => {
            currentAttendance[filterDate] = []; 
            
            snap.forEach(d => {
                const data = d.data();
                currentAttendance[filterDate].push({ id: d.id, ...data });
            });

            updateDashboard(); 
        });
    };

    // Fungsi semak masa ikut Role (7:10 Guru, 8:00 AKP)
    function checkIsLate(timeStr, role) {
        // timeStr format HH:MM, contoh "07:45"
        const roleUpper = (role || "GURU").toUpperCase(); // Default GURU jika tiada role
        let cutoff = "07:10"; // Default Guru

        if (roleUpper === "AKP") {
            cutoff = "08:00";
        }

        return timeStr > cutoff;
    }

    window.updateDashboard = () => {
        const filterDate = document.getElementById('dateFilter').value;
        const search = document.getElementById('searchName').value.toLowerCase();
        
        const recordsToday = currentAttendance[filterDate] || [];
        
        let countHadir = 0, countLewat = 0;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        if (allUsers.length === 0) return;

        allUsers.forEach(user => {
            if (search && !user.name.toLowerCase().includes(search)) return;

            const record = recordsToday.find(r => 
                r.name.trim().toUpperCase() === user.name.trim().toUpperCase()
            );

            let statusHTML = `<span class="tag tag-tidak">Tiada Rekod</span>`;
            let masaHTML = "--:--";
            let roleDisplay = user.role || "GURU"; // Tunjuk GURU jika tiada data

            if (record) {
                countHadir++;
                let timeStr = ""; // Untuk logik semakan

                if (record.timestamp) {
                    const dateObj = record.timestamp.toDate();
                    masaHTML = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
                    // Format masa 24 jam untuk perbandingan (HH:MM)
                    timeStr = dateObj.toTimeString().substring(0, 5); 
                }
                
                let stat = record.status || "Hadir";
                let warna = "tag-hadir";

                // --- SEMAKAN KEDUA (VISUAL CHECK) ---
                // Walaupun DB kata "Hadir", kita semak jam. Jika lewat, warnakan Kuning.
                const isLateByTime = timeStr ? checkIsLate(timeStr, user.role) : false;
                const isLateByText = stat.includes("Lewat");

                if (isLateByText || isLateByTime) {
                    warna = "tag-lewat";
                    countLewat++;
                    // Jika teks asal "Hadir (Manual)" tapi masa lewat, ia akan jadi kuning.
                }

                statusHTML = `<span class="tag ${warna}">${stat}</span>`;
            }

            tbody.innerHTML += `
                <tr>
                    <td>
                        <div style="font-weight:700; color:var(--text); cursor:pointer;" onclick="openIndividualCalendar('${user.name}')">${user.name}</div>
                        <span class="role-badge" onclick="changeUserRole('${user.id}', '${user.name}', '${roleDisplay}')" title="Klik untuk tukar jawatan">${roleDisplay}</span>
                    </td>
                    <td>${masaHTML}</td>
                    <td>${statusHTML}</td>
                    <td style="text-align:right;">
                        <button onclick="openManualModal('${user.name}')" class="btn btn-outline" style="padding:5px 10px; font-size:0.6rem;">Edit</button>
                        <button onclick="confirmDeleteUser('${user.id}', '${user.name}')" style="background:none; border:none; color:var(--danger); cursor:pointer; margin-left:10px;">🗑️</button>
                    </td>
                </tr>`;
        });

        document.getElementById('statTotal').innerText = allUsers.length;
        document.getElementById('statPresent').innerText = countHadir;
        document.getElementById('statLate').innerText = countLewat;
        document.getElementById('statAbsent').innerText = allUsers.length - countHadir;
    };

    // Fungsi Tukar Jawatan (Tanpa padam muka)
    window.changeUserRole = async (id, name, currentRole) => {
        const newRole = currentRole === "GURU" ? "AKP" : "GURU";
        if(confirm(`Tukar jawatan ${name} daripada ${currentRole} kepada ${newRole}?`)) {
            try {
                await updateDoc(doc(db, "users", id), { role: newRole });
                // alert("Jawatan dikemaskini."); // Optional, tak perlu alert pun tak apa sebab UI auto update
            } catch(e) {
                alert("Ralat: " + e.message);
            }
        }
    };

    window.register = async () => {
        const nameInput = document.getElementById('staffName');
        const roleInput = document.getElementById('staffRole'); // Ambil role
        const name = nameInput.value.trim().toUpperCase();
        const role = roleInput.value; 

        if (!name) return alert("Sila masukkan nama staf!");

        const statusLabel = document.getElementById('regStatus');
        const video = document.getElementById('adminVideo');
        let descriptors = [];

        for (let i = 1; i <= 3; i++) {
            statusLabel.innerText = `⌛ SAMPEL ${i}/3... GERAKKAN WAJAH`;
            statusLabel.style.color = "var(--warning)";
            await new Promise(r => setTimeout(r, 1000));

            const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 160 }))
                .withFaceLandmarks().withFaceDescriptor();

            if (det) {
                descriptors.push({ d: Array.from(det.descriptor) });
            } else {
                alert(`Sampel ${i} gagal. Cuba pastikan pencahayaan cukup.`);
                statusLabel.innerText = "AI SEDIA";
                return;
            }
        }

        try {
            const q = query(collection(db, "users"), where("name", "==", name));
            const snap = await getDocs(q);
            
            // Simpan data termasuk ROLE
            if (!snap.empty) {
                if(confirm(`Kemaskini data wajah ${name}?`)) {
                    await updateDoc(doc(db, "users", snap.docs[0].id), { 
                        descriptors, 
                        role: role // Update role juga
                    });
                    alert("Berjaya dikemaskini!");
                }
            } else {
                await addDoc(collection(db, "users"), { 
                    name, 
                    descriptors, 
                    role: role // Simpan role baru
                });
                alert("Pendaftaran berjaya!");
            }
            nameInput.value = "";
        } catch (e) { alert("Ralat Simpan: " + e.message); }
        statusLabel.innerText = "AI SEDIA";
        statusLabel.style.color = "var(--accent)";
    };

    window.clearAllAttendanceToday = async () => {
        if (!confirm("AMARAN: Padam SEMUA rekod kehadiran untuk tarikh yang dipilih?")) return;
        const pin = prompt("Sila masukkan PIN Admin untuk pengesahan:");
        if (pin !== ADMIN_PIN) return alert("PIN SALAH!");

        const selectedDate = document.getElementById('dateFilter').value;
        
        const startDate = new Date(selectedDate); startDate.setHours(0,0,0,0);
        const endDate = new Date(selectedDate); endDate.setHours(23,59,59,999);

        const q = query(
            collection(db, "attendance"), 
            where("timestamp", ">=", Timestamp.fromDate(startDate)),
            where("timestamp", "<=", Timestamp.fromDate(endDate))
        );
        
        const snap = await getDocs(q);
        
        let count = 0;
        const deletes = [];
        snap.forEach(d => {
            deletes.push(deleteDoc(doc(db, "attendance", d.id)));
            count++;
        });
        
        await Promise.all(deletes);
        alert(`Berjaya memadam ${count} rekod bagi tarikh ${selectedDate}.`);
    };

    window.openManualModal = (name) => {
        document.getElementById('modalTitle').innerText = "Edit Manual: " + name;
        document.getElementById('manualOptions').style.display = 'block';
        document.getElementById('pinModal').style.display = 'flex';
        document.getElementById('manualPinInput').value = "";
        
        const now = new Date();
        const timeString = now.toTimeString().split(' ')[0].substring(0, 5);
        document.getElementById('manualTimeInput').value = timeString;

        document.getElementById('pinSubmitBtn').onclick = () => submitManual(name);
    };

    async function submitManual(name) {
        if (document.getElementById('manualPinInput').value !== ADMIN_PIN) return alert("PIN SALAH!");
        
        let status = document.getElementById('statusSelect').value;
        const filterDateVal = document.getElementById('dateFilter').value; 
        const timeVal = document.getElementById('manualTimeInput').value;

        if (!timeVal) return alert("Sila tetapkan masa!");

        // Cari data user untuk tahu Role dia (Guru atau AKP)
        const userObj = allUsers.find(u => u.name === name);
        const userRole = userObj ? userObj.role : "Guru";

        // === LOGIK BARU: Check Role & Time ===
        if (status === "Hadir (Manual)") {
            if (checkIsLate(timeVal, userRole)) {
                status = "Hadir (Lewat)";
            }
        }
        // =====================================

        const dateTimeString = `${filterDateVal}T${timeVal}:00`;
        const finalDate = new Date(dateTimeString);

        try {
            await addDoc(collection(db, "attendance"), { 
                name: name.toUpperCase(), 
                status: status, 
                timestamp: Timestamp.fromDate(finalDate) 
            });
            
            alert(`Rekod disimpan: ${status} pada jam ${timeVal}`);
            closeModal('pinModal');
        } catch(e) { 
            console.error(e);
            alert("Ralat Simpan: " + e.message); 
        }
    }

    window.confirmDeleteUser = (id, name) => {
        if (prompt(`Taip 'PADAM' untuk buang guru ${name}:`) === 'PADAM') {
            deleteDoc(doc(db, "users", id)).then(() => alert("Staf dipadam."));
        }
    };

    window.openIndividualCalendar = (name) => {
        currentViewedStaff = name;
        calDate = new Date();
        document.getElementById('calStaffName').innerText = name;
        document.getElementById('calendarModal').style.display = 'flex';
        renderCalendar();
    };

    window.changeMonth = (val) => {
        calDate.setMonth(calDate.getMonth() + val);
        renderCalendar();
    };

    function renderCalendar() {
        const year = calDate.getFullYear();
        const month = calDate.getMonth();
        const monthNames = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];
        document.getElementById('calMonthYear').innerText = `${monthNames[month]} ${year}`;
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        ["AH", "IS", "SE", "RA", "KH", "JU", "SA"].forEach(d => grid.innerHTML += `<div class="calendar-day-label">${d}</div>`);
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
        
        for (let day = 1; day <= daysInMonth; day++) {
            const key = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const rec = (currentAttendance[key] || []).find(r => r.name.trim().toUpperCase() === currentViewedStaff.trim().toUpperCase());
            
            let dot = "";
            if (rec) {
                // Logic visual di kalendar pun ikut logik "Lewat" text
                if (rec.status.includes("Lewat")) dot = "dot-lewat";
                else if (rec.status.includes("Hadir")) dot = "dot-hadir";
                else dot = "dot-cuti";
            }
            grid.innerHTML += `<div class="calendar-cell">${day}${dot ? `<div class="dot ${dot}"></div>` : ''}</div>`;
        }
    }

    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.toggleTheme = () => {
        const current = document.body.getAttribute('data-theme');
        document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    };
    window.exportExcel = () => {
        const table = document.getElementById("reportTable");
        XLSX.writeFile(XLSX.utils.table_to_book(table), `Laporan_Kehadiran.xlsx`);
    };
    window.handleLogin = async () => { 
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { alert("Login Gagal!"); } 
    };
    window.handleLogout = () => signOut(auth);

    onAuthStateChanged(auth, u => {
        if (u) { 
            document.getElementById('loginSection').style.display = 'none'; 
            document.getElementById('adminContent').style.display = 'block'; 
            initAdmin();
        } else { 
            document.getElementById('loginSection').style.display = 'block'; 
            document.getElementById('adminContent').style.display = 'none'; 
        }
    });
</script>
</body>
</html>
