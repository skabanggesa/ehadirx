<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentadbir | Sistem Kehadiran V1.0</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--primary); }
        
        #loginSection { 
            max-width: 380px; margin: 100px auto; background: white; 
            padding: 40px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
        }
        .login-input { 
            width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #e2e8f0; 
            border-radius: 12px; box-sizing: border-box; font-size: 1rem;
        }

        .header { 
            display: flex; align-items: center; justify-content: space-between; 
            background: white; padding: 15px 5%; border-bottom: 1px solid #e2e8f0;
        }

        .main-container { padding: 30px 5%; display: grid; grid-template-columns: 1fr; gap: 25px; }

        .card { 
            background: white; padding: 25px; border-radius: 20px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        h2 { font-size: 0.9rem; margin-top: 0; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; font-weight: 800; }

        video { width: 100%; border-radius: 16px; background: #000; transform: scaleX(-1); }

        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-save { background: var(--accent); color: white; width: 100%; margin-top: 15px; }
        .btn-excel { background: var(--primary); color: white; }
        .btn-logout { background: #fee2e2; color: var(--danger); }
        .btn-manual { background: #dcfce7; color: #166534; padding: 6px 12px; font-size: 0.75rem; }
        .btn-del-user { background: #fff1f2; color: #be123c; padding: 6px 12px; font-size: 0.75rem; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #64748b; font-size: 0.75rem; border-bottom: 2px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }

        .status-tag { padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; }
        .tag-hadir { background: #d1fae5; color: #065f46; }
        .tag-tidak { background: #f1f5f9; color: #64748b; }

        /* MODAL CSS */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px; width: 300px; text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        @media (min-width: 1024px) { 
            .main-container { grid-template-columns: 380px 1fr; }
        }
    </style>
</head>
<body>

<div id="pinModal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-top:0;">Kod Akses</h3>
        <p style="font-size: 0.8rem; color: #666;">Sila masukkan kod pengesahan</p>
        <input type="password" id="manualPinInput" class="login-input" placeholder="****" maxlength="4" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;">
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="closePinModal()" class="btn" style="flex:1; background:#eee;">Batal</button>
            <button onclick="verifyManualPin()" class="btn" style="flex:1; background:var(--accent); color:white;">Sahkan</button>
        </div>
    </div>
</div>

<div id="loginSection">
    <img src="ehadir.png" alt="Logo" style="width:60px; margin-bottom:20px;">
    <h2 style="color:var(--primary)">Akses Pentadbir</h2>
    <input type="email" id="loginEmail" class="login-input" placeholder="Emel Rasmi">
    <input type="password" id="loginPass" class="login-input" placeholder="Kata Laluan">
    <button onclick="handleLogin()" class="btn btn-save">LOG MASUK</button>
</div>

<div id="adminContent" style="display:none;">
    <div class="header">
        <div style="font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px;">E-HADIR ADMIN</div>
        <button class="btn btn-logout" onclick="handleLogout()">LOG KELUAR</button>
    </div>

    <div class="main-container">
        <div style="display: flex; flex-direction: column; gap: 25px;">
            <div class="card">
                <h2>Daftar Wajah Baru</h2>
                <video id="adminVideo" autoplay muted playsinline></video>
                <input type="text" id="staffName" placeholder="Nama Penuh Guru" class="login-input" style="margin-top:15px;">
                <button onclick="register()" class="btn btn-save">SIMPAN IDENTITI</button>
            </div>

            <div class="card">
                <h2>Senarai Staf & Manual</h2>
                <div style="max-height: 300px; overflow-y: auto;">
                    <table style="width: 100%;">
                        <tbody id="staffListBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="margin:0;">Laporan Kehadiran Hari Ini</h2>
                <button onclick="exportExcel()" class="btn btn-excel">MUAT TURUN EXCEL</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="reportTable">
                    <thead>
                        <tr>
                            <th>Guru / Kakitangan</th>
                            <th>Masa</th>
                            <th>Status</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, getDocs, where, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
  apiKey: "AIzaSyCwh99Ui4KPXgC-W-CpCg-edYnHN3aVmrk",
  authDomain: "portal-8368.firebaseapp.com",
  projectId: "portal-8368",
  storageBucket: "portal-8368.firebasestorage.app",
  messagingSenderId: "150403488308",
  appId: "1:150403488308:web:fac9b3c52dcd9975130861"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let pendingManualName = ""; // Simpan nama staf sementara menunggu PIN

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            initAdmin(); 
        } else {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminContent').style.display = 'none';
        }
    });

    window.handleLogin = async () => {
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value);
        } catch (e) { alert("Gagal Log Masuk!"); }
    };

    window.handleLogout = () => signOut(auth);

    async function initAdmin() {
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri('models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('models');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('adminVideo').srcObject = stream;
        } catch (e) { console.log("Kamera/Model ralat"); }

        onSnapshot(collection(db, "users"), (uSnap) => {
            const users = [];
            const staffList = document.getElementById('staffListBody');
            staffList.innerHTML = "";

            uSnap.forEach(d => {
                const userData = d.data();
                users.push({id: d.id, ...userData});
                staffList.innerHTML += `
                    <tr>
                        <td><strong>${userData.name}</strong></td>
                        <td style="text-align:right;">
                            <button onclick="markManual('${userData.name}')" class="btn btn-manual">HADIR</button>
                            <button onclick="deleteUser('${d.id}', '${userData.name}')" class="btn btn-del-user">🗑️</button>
                        </td>
                    </tr>`;
            });

            const qAtt = query(collection(db, "attendance"), orderBy("timestamp", "desc"));
            onSnapshot(qAtt, (aSnap) => {
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = "";
                const today = new Date().toLocaleDateString('en-CA');
                const logs = {};

                aSnap.forEach(d => {
                    const data = d.data();
                    const ts = data.timestamp?.toDate();
                    if(ts && ts.toLocaleDateString('en-CA') === today) {
                        logs[data.name] = { time: ts.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), status: data.status, id: d.id };
                    }
                });

                users.forEach(u => {
                    const log = logs[u.name];
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${u.name}</strong></td>
                            <td>${log ? log.time : '--:--'}</td>
                            <td><span class="status-tag ${log ? 'tag-hadir' : 'tag-tidak'}">${log ? log.status : 'Belum Hadir'}</span></td>
                            <td style="text-align:right;">${log ? `<button onclick="deleteRecord('${log.id}')" style="color:red; background:none; border:none; cursor:pointer;">Padam</button>` : ''}</td>
                        </tr>`;
                });
            });
        });
    }

    // MODAL ACTIONS
    window.markManual = (name) => {
        pendingManualName = name;
        document.getElementById('pinModal').style.display = 'flex';
        document.getElementById('manualPinInput').value = "";
        document.getElementById('manualPinInput').focus();
    };

    window.closePinModal = () => {
        document.getElementById('pinModal').style.display = 'none';
        pendingManualName = "";
    };

    window.verifyManualPin = async () => {
        const pin = document.getElementById('manualPinInput').value;
        if(pin === "1234") {
            const name = pendingManualName;
            closePinModal();
            
            const todayStr = new Date().toLocaleDateString('en-CA');
            const q = query(collection(db, "attendance"), where("name", "==", name));
            const snap = await getDocs(q);
            let existingId = null;

            snap.forEach(d => {
                if(d.data().timestamp?.toDate().toLocaleDateString('en-CA') === todayStr) existingId = d.id;
            });

            if(existingId) {
                await updateDoc(doc(db, "attendance", existingId), { timestamp: serverTimestamp(), status: "Hadir (Manual)" });
            } else {
                await addDoc(collection(db, "attendance"), { name: name, timestamp: serverTimestamp(), status: "Hadir (Manual)" });
            }
            alert("Kehadiran Berjaya Direkod");
        } else {
            alert("Kod Akses Salah!");
            document.getElementById('manualPinInput').value = "";
        }
    };

    window.register = async () => {
        const nameInput = document.getElementById('staffName');
        const detection = await faceapi.detectSingleFace(document.getElementById('adminVideo'), new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        if (detection && nameInput.value) {
            await addDoc(collection(db, "users"), { name: nameInput.value, descriptor: Array.from(detection.descriptor) });
            alert("Identiti Wajah Berjaya Disimpan");
            nameInput.value = "";
        } else { alert("Wajah tidak dikesan / Nama kosong!"); }
    };

    window.deleteUser = async (id, name) => {
        if(confirm(`Padam profil ${name} secara kekal?`)) await deleteDoc(doc(db, "users", id));
    };

    window.deleteRecord = async (id) => {
        if(confirm("Padam rekod kehadiran ini?")) await deleteDoc(doc(db, "attendance", id));
    };

    window.exportExcel = () => {
        const wb = XLSX.utils.table_to_book(document.getElementById("reportTable"));
        XLSX.writeFile(wb, `Laporan_Kehadiran_${new Date().toLocaleDateString()}.xlsx`);
    };
</script>
</body>
</html>
